services:
  postgres:
    image: postgres:16-alpine
    container_name: day-planner-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: day_planner
      POSTGRES_PASSWORD: day_planner
      POSTGRES_DB: day_planner
    ports:
      - "5433:5432"
    volumes:
      - day-planner-postgres-data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U day_planner -d day_planner"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  day-planner-postgres-data:
